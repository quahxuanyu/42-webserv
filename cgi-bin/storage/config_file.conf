
server {
	listen 127.0.0.1:8080;
	server_name server_1;

	root /home/yphang/Desktop/Webserv;

	error_page 400 /error_page/404.html;
	error_page 401 /error_page/401.html;
	error_page 403 /error_page/403.html;
	error_page 404 /error_page/404.html;
	error_page 405 /error_page/405.html;
	error_page 413 /error_page/413.html;
	error_page 500 /error_page/500.html;
	error_page 501 /error_page/501.html;
	error_page 504 /error_page/504.html;
	error_page 505 /error_page/505.html;

	client_body_size_buf 10000000;

	location / {
		root /home/yphang/Desktop/Webserv;
		index sample.html;
		autoindex on;
		methods GET POST;
	}

	location /upload {
		alias /home/yphang/Desktop/Webserv/uploads;
		index upload.html;
		methods POST;
	}

	location /redirect {
		return 301 /upload;
		return 301 http://profile-v3.intra.42.fr/;
	}

	location /cgi-bin/ {
		cgi on;
		methods GET POST DELETE;
	}
}

