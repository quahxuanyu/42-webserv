<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>500 Internal Server Error</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #e0ccff, #f0e6ff); /* Soft purple gradient */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.85);
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .error-code {
      font-size: 8rem;
      font-weight: bold;
      color: #7851A9; /* Royal Purple */
    }

    .message {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #7851A9; /* Royal Purple */
    }

    .home-link {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: #6f42c1; /* Bootstrap purple */
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    .home-link:hover {
      background-color: #563d7c;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">505</div>
    <div class="message">HTTP Version Not Supported</div>
    <a class="home-link" href="/">Back to Home</a>
  </div>
</body>
</html>
