<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File List</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    ul { list-style-type: none; padding: 0; }
    li { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 5px; 
      border-bottom: 1px solid #ddd; 
    }
    .btn { 
      padding: 4px 8px; 
      border: none; 
      border-radius: 4px; 
      cursor: pointer; 
      margin-left: 5px;
    }
    .btn-delete {
      background-color: #d9534f; 
      color: white; 
    }
    .btn-delete:hover {
      background-color: #c9302c;
    }
    .btn-view {
      background-color: #5cb85c; 
      color: white; 
    }
    .btn-view:hover {
      background-color: #449d44;
    }
    .actions {
      display: flex;
      gap: 5px;
    }
  </style>
</head>
<body>
  <h1>Available Files</h1>
  <ul id="file-list"></ul>

  <script>
    // Fetch file list
    fetch("/cgi-bin/get_files.cgi")
      .then(response => response.json())
      .then(files => {
        const list = document.getElementById("file-list");
        files.forEach(file => {
          const li = document.createElement("li");

          // filename text
          const span = document.createElement("span");
          span.textContent = file;
          li.appendChild(span);

          // action buttons container
          const actions = document.createElement("div");
          actions.className = "actions";

          // view button
          const viewBtn = document.createElement("button");
          viewBtn.textContent = "View";
          viewBtn.className = "btn btn-view";
          viewBtn.onclick = () => {
            window.open(`/cgi-bin/storage/${encodeURIComponent(file)}`, "_blank");
          };
          actions.appendChild(viewBtn);

          // delete button
          const delBtn = document.createElement("button");
          delBtn.textContent = "Delete";
          delBtn.className = "btn btn-delete";
          delBtn.onclick = () => {
            fetch(`/cgi-bin/storage/${encodeURIComponent(file)}`, {
              method: "DELETE"
            })
            .then(res => {
              if (res.ok) {
                li.remove(); // remove from UI if deleted successfully
              } else {
                console.error("Failed to delete:", file);
              }
            })
            .catch(err => console.error("Error:", err));
          };
          actions.appendChild(delBtn);

          li.appendChild(actions);
          list.appendChild(li);
        });
      })
      .catch(err => {
        console.error("Error fetching file list:", err);
      });
  </script>
</body>
</html>
